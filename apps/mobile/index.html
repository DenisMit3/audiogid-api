<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AudioGuide - Экскурсии по городу</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- MapLibre CSS -->
    <link href="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
  </head>
  <body class="dark-theme">
    <div id="app">
      <div id="map" class="map-container"></div>

      <!-- Top HUD - Header with Search -->
      <header class="hud-top">
        <div class="header-content">
          <div class="header-title-group">
            <h1 class="app-title">AudioGuide</h1>
            <p class="app-subtitle">Экскурсии по городу</p>
          </div>
          <button class="header-btn" id="menu-btn" aria-label="Меню">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="1"></circle>
              <circle cx="19" cy="12" r="1"></circle>
              <circle cx="5" cy="12" r="1"></circle>
            </svg>
          </button>
        </div>
        <div class="search-bar glass">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input type="text" placeholder="Поиск экскурсий..." id="search-input" />
        </div>
      </header>

      <!-- FAB HUD - Action Buttons -->
      <div class="hud-fab">
        <button id="locate-btn" class="fab fab-primary" aria-label="Определить местоположение" title="Моё местоположение">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
        </button>
        <button id="filter-btn" class="fab fab-secondary" aria-label="Фильтры" title="Фильтры">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
          </svg>
        </button>
      </div>

      <!-- Bottom Sheet - Tours Drawer -->
      <div id="drawer" class="drawer glass" role="dialog" aria-label="Список экскурсий">
        <div class="drawer-handle"></div>
        <div class="drawer-content">
          <!-- Featured Section -->
          <section class="drawer-section featured-section">
            <div class="section-header">
              <h2 class="section-title">✨ Популярные сейчас</h2>
              <button class="view-all-btn" id="view-featured">Все →</button>
            </div>
            <div id="featured-tours" class="horizontal-scroll">
              <div class="loading-skeleton card-skeleton"></div>
              <div class="loading-skeleton card-skeleton"></div>
            </div>
          </section>

          <!-- Nearby Section -->
          <section class="drawer-section nearby-section">
            <div class="section-header">
              <h2 class="section-title">📍 Рядом с вами</h2>
            </div>
            <div id="nearby-tours" class="vertical-list">
              <div class="loading-skeleton list-skeleton"></div>
              <div class="loading-skeleton list-skeleton"></div>
            </div>
          </section>

          <!-- All Tours Section -->
          <section class="drawer-section all-section">
            <div class="section-header">
              <h2 class="section-title">🎫 Все экскурсии</h2>
            </div>
            <div id="all-tours" class="vertical-list">
              <div class="loading-skeleton list-skeleton"></div>
              <div class="loading-skeleton list-skeleton"></div>
            </div>
          </section>

          <!-- Empty State -->
          <div id="empty-state" class="empty-state hidden">
            <div class="empty-illustration">
              <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
            </div>
            <h3>Экскурсий не найдено</h3>
            <p>Попробуйте изменить параметры поиска</p>
          </div>

          <!-- Error State -->
          <div id="error-state" class="error-state hidden">
            <div class="error-icon">⚠️</div>
            <h3>Ошибка загрузки</h3>
            <p>Не удалось загрузить экскурсии. Проверьте интернет-соединение.</p>
            <button id="retry-btn" class="retry-btn">Повторить</button>
          </div>
        </div>
      </div>

      <!-- Tour Detail Modal -->
      <div id="tour-detail-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content glass">
          <button class="modal-close" id="close-modal" aria-label="Закрыть">×</button>
          <div id="tour-detail-inner"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
